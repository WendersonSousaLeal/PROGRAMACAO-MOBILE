<body>

 <main>
        <h1>Contato</h1>
        <p>Gostou do meu perfil? Me mande uma mensagem preenchendo o formulário abaixo.</p>
        
        <form action="#" method="post">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>

            <label for="texto">Mensagem:</label>
            <input type="text">

            <label for="assunto">Assunto da Mensagem:</label>
            <select id="assunto" name="assunto">

                <option value="freelance">Projeto Freelance</option>

                <option value="estagio">Oportunidade de Estágio</option>
            
                <option value="duvida">Dúvida Geral</option>
                <option value="outro">Outros</option>
            </select>

            <p style="margin-bottom: 10px;">Motivo principal:</p>
            <input type="radio" id="urgente" name="prioridade" value="urgente" style="width: auto;">
            <label for="urgente" style="margin-right: 15px;">Urgente</label>
            
            <input type="radio" id="normal" name="prioridade" value="normal" checked style="width: auto;">
            <label for="normal">Normal</label>
            
            <br><br>

            <input type="submit" value="Enviar Mensagem">
        </form>
